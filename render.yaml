
services:
  # Backend Web Service
  - type: web
    name: url-shortener-api
    runtime: go
    buildCommand: cd backend && go build -o ../bin/api main.go
    startCommand: ./bin/api
    envVars:
      - key: PORT
        value: 8080
      - key: GIN_MODE
        value: release
      - key: DATABASE_URL
        fromDatabase:
          name: url-shortener-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: url-shortener-redis
          type: redis
          property: connectionString
      - key: RATE_LIMIT_ENABLED
        value: true
      - key: RATE_LIMIT_REQUESTS_PER_MINUTE
        value: 60
      - key: CLICK_BUFFER_TTL_SECONDS
        value: 300
      - key: FRONTEND_URL
        value: https://url-shortener-frontend.vercel.app
    healthCheckPath: /api/health

databases:
  - name: url-shortener-db
    databaseName: urlshortener
    user: urlshortener

  - name: url-shortener-redis
    type: redis
    plan: free
    maxmemoryPolicy: allkeys-lru
